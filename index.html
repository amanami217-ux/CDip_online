<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Diplomacy Board</title>
<style>
:root {
  --paper: #e8e0cd; --panel: #f4efe2; --ink: #33302a; --line: #b9ae97;
  --sea: #b7c9d3; --land: #efe9dc; --impass: #cdc9c0; --accent: #7a5c2e;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; height: 100%; overflow: hidden; }
body {
  background: var(--paper); color: var(--ink);
  font-family: "Hiragino Sans", "Yu Gothic UI", "Noto Sans JP", sans-serif;
  font-size: 14px;
}
.hidden { display: none !important; }
button { font-family: inherit; cursor: pointer; }

/* ---- タイトル ---- */
#title {
  position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at 50% 35%, #efe8d6, #ddd2b8);
}
.t-card { text-align: center; padding: 32px 40px; }
.t-card h1 { font-family: "Hiragino Mincho ProN", "Yu Mincho", serif; font-size: 44px; margin: 0 0 4px; letter-spacing: .08em; }
.t-card .sub { color: #6d6350; margin-bottom: 28px; }
.t-btns { display: flex; flex-direction: column; gap: 12px; width: 300px; margin: 0 auto; }
.t-note { color: #6d6350; font-size: 12.5px; line-height: 1.7; }

/* ---- 基本ボタン ---- */
.btn {
  border: 1px solid #8d8168; border-radius: 8px; padding: 11px 18px;
  background: linear-gradient(#fbf7ec, #e9e1cc); color: var(--ink); font-size: 15px;
}
.btn.main { background: linear-gradient(#8d6f3f, #6f5527); color: #fdf9ee; border-color: #5c4720; font-weight: 600; }
.btn.main:disabled { opacity: .45; }
.btn.sub {}
.btn.warn { color: #8f2f23; border-color: #a56; }
.ib {
  border: 1px solid #9a8f77; background: #f4eedd; border-radius: 7px;
  width: 36px; height: 34px; font-size: 17px; line-height: 1;
}

/* ---- アプリ枠 ---- */
#app { display: flex; flex-direction: column; height: 100%; }
#hdr {
  display: flex; align-items: center; gap: 10px; padding: 6px 10px;
  background: linear-gradient(#efe7d2, #e3d8bd); border-bottom: 1px solid var(--line);
}
#hdr .ttl { font-family: "Hiragino Mincho ProN", serif; font-weight: 700; letter-spacing: .06em; }
#hdr .ph { flex: 1; text-align: center; }
#hdr .ph b { font-size: 17px; }
#hdr .phn { margin-left: 8px; color: #6d6350; }
#hdr .hr { display: flex; align-items: center; gap: 6px; }
.chip { color: #fff; border-radius: 999px; padding: 3px 12px; font-size: 13px; }
.modebtn { border: 1px solid #9a8f77; background: #f4eedd; border-radius: 999px;
  padding: 5px 12px; font-size: 13px; }
.victag { background: #8f2f23; color: #fff; border-radius: 999px; padding: 3px 10px; font-size: 12px; }

#main { position: relative; flex: 1; overflow: hidden; }
#mapwrap { position: absolute; inset: 0; }
#map { width: 100%; height: 100%; display: block; touch-action: none; background: var(--sea); }

/* ---- マップ要素 ---- */
.prov { stroke: none; }
.prov.impass { pointer-events: none; }
.island { fill: url(#hatch); stroke: #5a6a74; stroke-width: 1.2; pointer-events: none; }
.b-coast-halo { fill: none; stroke: #edf3f6; stroke-width: 4.6; opacity: .9;
  stroke-linejoin: round; pointer-events: none; }
.b-coast { fill: none; stroke: #5a6a74; stroke-width: 1.6; stroke-linejoin: round; pointer-events: none; }
.b-land  { fill: none; stroke: #a89d89; stroke-width: .9; pointer-events: none; }
.b-sea   { fill: none; stroke: #93a8b4; stroke-width: .8; stroke-dasharray: 5 5; opacity: .85; pointer-events: none; }
.b-frame { fill: none; stroke: #57503f; stroke-width: 2.6; pointer-events: none; }
.channel-casing { fill: none; stroke: #4f616c; stroke-width: 8.5; stroke-linecap: butt; pointer-events: none; }
.channel-water  { fill: none; stroke: #b3c6d1; stroke-width: 5.4; stroke-linecap: butt; pointer-events: none; }
#map, #map text { user-select: none; -webkit-user-select: none; }
.lake { stroke: #93a8b4; stroke-width: .7; pointer-events: none; }
.b-bathy2 { fill: none; stroke: #8fabbb; stroke-width: 10.5; opacity: .16; stroke-linejoin: round; pointer-events: none; }
.b-bathy1 { fill: none; stroke: #8fabbb; stroke-width: 6; opacity: .30; stroke-linejoin: round; pointer-events: none; }
.fitbtn { margin-right: 10px; }
.landmass { stroke: none; pointer-events: none; }
.canal-water { stroke: none; pointer-events: none; }
.arr-sup { pointer-events: none; }
.lab { font-size: 11px; fill: #5a5140; letter-spacing: .04em; pointer-events: none; }
.lab-sea { fill: #47637a; font-style: italic; }
.scmark { stroke: #57503f; stroke-width: 1.1; pointer-events: none; }
.unitg { cursor: pointer; }
.unit-body { stroke: #26221c; stroke-width: 1.3; }
.unit-detail { stroke: #26221c; stroke-width: 1.6; stroke-linecap: round; }
.unit-wheel { fill: #26221c; stroke: none; }
.coast-tag { font-size: 9px; fill: #2b2620; font-weight: 700; }
.dis-ring { fill: none; stroke: #b23b2e; stroke-width: 2.4; stroke-dasharray: 4 3; }
.done-tag { font-size: 12px; fill: #2c7a3a; font-weight: 700; }
.hl-strong { fill: rgba(199, 141, 38, .38); stroke: #a76f10; stroke-width: 1.2; pointer-events: none; }
.hl-faint  { fill: rgba(199, 141, 38, .16); pointer-events: none; }
.hl-self   { fill: rgba(45, 92, 160, .25); stroke: #2d5ca0; stroke-width: 1.4; pointer-events: none; }

/* ---- サイドパネル ---- */
#panel {
  position: absolute; top: 0; right: 0; bottom: 0; width: 320px; max-width: 85%;
  background: var(--panel); border-left: 1px solid var(--line);
  overflow-y: auto; padding: 10px; transform: translateX(100%);
  transition: transform .18s ease; z-index: 5;
}
#panel.open { transform: none; box-shadow: -4px 0 14px rgba(0,0,0,.18); }
@media (min-width: 980px) {
  #panel { transform: none; box-shadow: none; }
  #mapwrap { right: 320px; }
}
.psec { margin-bottom: 14px; }
.ptitle {
  font-weight: 700; border-left: 5px solid #8d8168; padding: 2px 8px; margin-bottom: 6px;
  display: flex; justify-content: space-between; align-items: baseline;
}
.ptitle small { color: #6d6350; font-weight: 400; }
.oline {
  display: flex; align-items: center; gap: 6px;
  background: #fbf7ec; border: 1px solid #ddd3bc; border-radius: 7px;
  padding: 6px 8px; margin-bottom: 5px;
}
.oline.noorder { opacity: .55; background: transparent; }
.otxt { flex: 1; min-width: 0; }
.otxt b { font-size: 13.5px; }
.otxt small { display: block; color: #6d6350; }
.void { display: block; color: #a33; font-size: 12px; }
.del { border: 1px solid #b9ae97; background: #f1eada; border-radius: 6px; padding: 3px 9px; }
.note { color: #6d6350; margin: 2px 0 6px; }
.rline { padding: 3px 4px; border-bottom: 1px dashed #d8cdb4; font-size: 13px; }

/* ---- フッタ ---- */
#foot {
  border-top: 1px solid var(--line); background: linear-gradient(#efe7d2, #e6dcc2);
  padding: 7px 10px; display: flex; align-items: center; gap: 10px;
}
.fhint { flex: 1; color: #5c5340; font-size: 13px; }
.fbtns { display: flex; gap: 8px; }

/* ---- 行動パレット ---- */
#sheet {
  position: absolute; left: 10px; right: 10px; bottom: 12px; z-index: 6;
  background: #fbf7ec; border: 1px solid #b9ae97; border-radius: 12px;
  box-shadow: 0 6px 22px rgba(40,32,16,.25); padding: 10px 12px;
  max-width: 560px; margin: 0 auto;
}
.sh-title { font-weight: 700; border-left: 5px solid #888; padding-left: 8px; margin-bottom: 8px; }
.sh-btns { display: flex; flex-wrap: wrap; gap: 8px; }
.sh-btns button {
  flex: 1 1 90px; border: 1px solid #8d8168; border-radius: 8px; padding: 10px 6px;
  background: linear-gradient(#fbf7ec, #e9e1cc); font-size: 15px;
}
.sh-btns button.warn { color: #8f2f23; }

/* ---- カバー・モーダル・トースト ---- */
#cover {
  position: fixed; inset: 0; z-index: 40;
  background: repeating-linear-gradient(45deg, #d9cfb4, #d9cfb4 14px, #d2c6a8 14px, #d2c6a8 28px);
  display: flex; align-items: center; justify-content: center;
}
.cov-card {
  background: #fbf7ec; border: 2px solid #888; border-radius: 14px;
  padding: 30px 36px; text-align: center; max-width: 420px;
  box-shadow: 0 10px 30px rgba(40,32,16,.3);
}
.cov-card.wide { max-width: 560px; width: 94%; text-align: left; padding: 18px 22px 20px; }
.cov-mini { display: flex; justify-content: flex-end; gap: 6px; }
.cov-t { color: #55503f; margin-bottom: 18px; line-height: 1.7; }
.cov-t.big { font-size: 19px; font-weight: 700; color: var(--ink); text-align: center;
  margin: -4px 0 0; }
.cov-sub { color: #6d6350; font-size: 13.5px; text-align: center; margin: 6px 0 2px; }
.pw-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 14px 0 4px; }
.pw-btn { display: flex; align-items: center; gap: 8px; padding: 12px 10px;
  border: 2px solid #b9ae97; border-radius: 10px; background: #fbf7ec; font-size: 15px; }
.pw-dot { width: 12px; height: 12px; border-radius: 50%; flex: none; }
.pw-st { margin-left: auto; font-size: 11.5px; color: #2c7a3a; white-space: nowrap; }
.pw-st.dim { color: #6d6350; }
.wfull { width: 100%; margin-top: 9px; }
#modal {
  position: fixed; inset: 0; z-index: 50; background: rgba(30, 24, 12, .45);
  display: flex; align-items: center; justify-content: center; padding: 16px;
}
.m-card {
  background: #fbf7ec; border: 1px solid #9a8f77; border-radius: 12px;
  padding: 18px 20px; min-width: 280px; max-width: 460px; width: 100%;
  max-height: 84vh; overflow-y: auto;
}
.m-title { font-weight: 700; font-size: 16px; margin-bottom: 12px; }
.m-btns { display: flex; flex-direction: column; gap: 9px; margin-top: 10px; }
.hist { max-height: 52vh; overflow-y: auto; border: 1px solid #ddd3bc; padding: 8px; background: #fff9; }
.h-h { font-weight: 700; margin-top: 8px; border-bottom: 1px solid #c9bd9f; }
.h-l { font-size: 12.5px; padding: 1px 0 1px 8px; }
#toast {
  position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%);
  background: #3a342a; color: #f7f2e4; padding: 9px 18px; border-radius: 999px;
  z-index: 60; font-size: 13.5px; box-shadow: 0 4px 14px rgba(0,0,0,.3);
}
</style>
</head>
<body>

<div id="title">
  <div class="t-card">
    <h1>DIPLOMACY</h1>
    <div class="sub">Face-to-face play &amp; adjudication board — standard rules, Europe 1901</div>
    <div class="t-btns">
      <button class="btn main hidden" id="resumeBtn">Resume last game</button>
      <button class="btn main" data-act="newGame">New game</button>
      <button class="btn sub" data-act="importTitle">Load a saved file</button>
      <button class="btn sub" data-act="credits">Credits</button>
    </div>
  </div>
</div>

<div id="app" class="hidden">
  <header id="hdr"></header>
  <div id="main">
    <div id="mapwrap"><svg id="map" viewBox="0 0 1000 820" preserveAspectRatio="xMidYMid meet"></svg></div>
    <aside id="panel"></aside>
    <div id="sheet" class="hidden"></div>
  </div>
  <footer id="foot"></footer>
</div>

<div id="cover" class="hidden"></div>
<div id="modal" class="hidden"></div>
<div id="toast" class="hidden"></div>
<input type="file" id="filein" accept=".json,application/json" class="hidden">

    if (sel.step === 'sTarget') {
      if (!inStrong) return;
      ui.sel = { ...sel, step: 'sDest', sTarget: p }; render(); return;
    }
    if (sel.step === 'sDest') {
      if (!inStrong) return;
      setRaw(sel.unit, p === sel.sTarget
        ? { kind: 'support', from: sel.sTarget }
        : { kind: 'support', from: sel.sTarget, sTo: p });
      return;
    }
    if (sel.step === 'cArmy') {
      if (!inStrong) return;
      ui.sel = { ...sel, step: 'cDest', cArmy: p }; render(); return;
    }
    if (sel.step === 'cDest') {
      if (!inStrong) return;
      setRaw(sel.unit, { kind: 'convoy', from: sel.cArmy, to: p });
      return;
    }
  }
  const u = S.units[p];
  if (u && canCommand(u.power)) { ui.sel = { unit: p, step: 'action' }; render(); }
  else if (sel) { ui.sel = null; render(); }
}
// 移動先確定（沿岸・経路の追加確認を挟む）
function chooseMoveDest(loc, dest, faintOnly) {
  const u = S.units[loc];
  if (u.type === 'F') {
    const node = u.coast ? loc + '/' + u.coast : loc;
    const cands = E.fleetReach(node, dest);
    if (cands.length >= 2) {
      openModal(`Which coast of ${jname(dest)}?`, cands.map(k => {
        const c = k.split('/')[1];
        return { label: COAST_J[c] || c, cb: () => setRaw(loc, { kind: 'move', to: dest, toCoast: c }) };
      }));
      return;
    }
    setRaw(loc, { kind: 'move', to: dest, toCoast: cands[0].includes('/') ? cands[0].split('/')[1] : null });
    return;
  }
  const landAdj = (AADJ[loc] || []).includes(dest);
  if (!landAdj) { setRaw(loc, { kind: 'move', to: dest, viaConvoy: true }); return; }
  const seaAccess = p2 => [...(E.FADJ_PROV[p2] || [])].some(isSea);
  if (faintOnly || !(isCoastal(loc) && isCoastal(dest) && seaAccess(loc) && seaAccess(dest))) {
    setRaw(loc, { kind: 'move', to: dest }); return;
  }
  openModal(`${jname(loc)} → ${jname(dest)}: which route?`, [
    { label: 'By land', cb: () => setRaw(loc, { kind: 'move', to: dest }) },
    { label: 'By convoy', cb: () => setRaw(loc, { kind: 'move', to: dest, viaConvoy: true }) },
  ]);
}
function setRaw(loc, order) {
  S.raw[loc] = order;
  ui.sel = null; closeModal(); autosave(); render();
}
function tapRetreat(t) {
  const sel = ui.sel;
  // 退却先の選択中: 候補地域のタップで確定（沿岸2択なら選択モーダル）
  if (sel && sel.retreatFrom && t.prov && !t.rmark) {
    const d = S.pending.dislodged.find(d => d.prov === sel.retreatFrom);
    const opt = d.retreats.filter(c => c.to === t.prov);
    if (opt.length >= 2) {
      openModal(`Retreat to which coast of ${jname(t.prov)}?`, opt.map(c => ({
        label: COAST_J[c.toCoast] || c.toCoast,
        cb: () => { S.retreat.raw[sel.retreatFrom] = { to: c.to, toCoast: c.toCoast }; ui.sel = null; closeModal(); autosave(); render(); },
      })));
      return;
    }
    if (opt.length === 1) {
      S.retreat.raw[sel.retreatFrom] = { to: opt[0].to, toCoast: opt[0].toCoast || null };
      ui.sel = null; autosave(); render(); return;
    }
    // 候補外の地面タップは選択解除へ流す
  }
  if (t.rmark) {
    const d = S.pending.dislodged.find(d => d.prov === t.rmark);
    if (d && canCommand(d.unit.power)) { ui.sel = { retreatFrom: t.rmark }; render(); }
    return;
  }
  if (sel) { ui.sel = null; render(); }
}
function tapBuild(t) {
  const p = t.unit || t.prov;
  const pw = currentPower();
  const pws = pw ? [pw] : S.build.needing;
  for (const w of pws) {
    const info = S.build.info[w], sel = S.build.sel[w];
    if (info.delta > 0) {
      const site = info.buildSites.find(b => b.prov === p);
      const already = sel.builds.findIndex(b => b.prov === p);
      if (already >= 0) { sel.builds.splice(already, 1); autosave(); render(); return; }
      if (!site) continue;
      if (sel.builds.length >= Math.min(info.delta, info.buildSites.length)) { toast('No builds remaining'); return; }
      const opts = [{ label: 'Build an army', cb: () => { sel.builds.push({ prov: p, type: 'A' }); closeModal(); autosave(); render(); } }];
      if (site.coastal) {
        if (site.coasts) {
          for (const c of site.coasts)
            opts.push({ label: `Build a fleet (${COAST_J[c]})`, cb: () => { sel.builds.push({ prov: p, type: 'F', coast: c }); closeModal(); autosave(); render(); } });
        } else {
          opts.push({ label: 'Build a fleet', cb: () => { sel.builds.push({ prov: p, type: 'F' }); closeModal(); autosave(); render(); } });
        }
      }
      openModal(`Build in ${jname(p)}`, opts);
      return;
    } else {
      const u = S.units[p];
      if (!u || u.power !== w) continue;
      const i = sel.disbands.indexOf(p);
      if (i >= 0) sel.disbands.splice(i, 1);
      else {
        if (sel.disbands.length >= -info.delta) { toast('No more disbands needed'); return; }
        sel.disbands.push(p);
      }
      autosave(); render(); return;
    }
  }
}

// ---------- メニュー・保存・読込 ----------
function exportPayload() {
  const { snapshots, ...rest } = S;
  return { app: 'dip-board', v: 1, saved: new Date().toISOString(), state: rest };
}
function doExport() {
  const blob = new Blob([JSON.stringify(exportPayload(), null, 1)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `diplomacy_${S.year}${S.season}_${Date.now()}.json`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}
function doImport(file) {
  const rd = new FileReader();
  rd.onload = () => {
    try {
      const j = JSON.parse(rd.result);
      if (!j || j.app !== 'dip-board' || !j.state) throw new Error('invalid file format');
      S = normalizeState({ ...j.state, snapshots: [] });
      ui.sel = null; ui.modeSelect = false; closeModal();
      $('title').classList.add('hidden'); $('app').classList.remove('hidden');
      initMap(); render(); toast('Loaded');
    } catch (e) { toast('Import failed: ' + e.message); }
  };
  rd.readAsText(file);
}
async function autosave() {
  try {
    if (window.storage && typeof window.storage.set === 'function')
      await window.storage.set('dip-autosave', JSON.stringify(exportPayload()));
  } catch (e) { /* 保存不可環境では無視 */ }
}
async function loadAutosave() {
  try {
    if (window.storage && typeof window.storage.get === 'function') {
      const r = await window.storage.get('dip-autosave');
      if (r && r.value) return JSON.parse(r.value);
    }
  } catch (e) { /* 無視 */ }
  return null;
}

// ---------- 入力イベント配線 ----------
function wire() {
  // パン・ズーム・タップ
  const svg = $('map');
  const ptrs = new Map();
  let moved = false, pinch0 = null, tapTarget = null;
  svg.addEventListener('pointerdown', e => {
    svg.setPointerCapture(e.pointerId);
    ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY });
    moved = false; tapTarget = e.target;
    if (ptrs.size === 2) {
      const [a, b] = [...ptrs.values()];
      pinch0 = { d: Math.hypot(a.x - b.x, a.y - b.y), k: ui.tf.k,
                 cx: (a.x + b.x) / 2, cy: (a.y + b.y) / 2, tx: ui.tf.x, ty: ui.tf.y };
    }
  });
  svg.addEventListener('pointermove', e => {
    if (!ptrs.has(e.pointerId)) return;
    const p = ptrs.get(e.pointerId);
    const dx = e.clientX - p.x, dy = e.clientY - p.y;
    if (Math.hypot(dx, dy) > 6) moved = true;
    if (ptrs.size === 1 && moved) {
      ui.tf.x += dx * viewScale(); ui.tf.y += dy * viewScale();
      p.x = e.clientX; p.y = e.clientY;
      applyTransform();
    } else if (ptrs.size === 2) {
      p.x = e.clientX; p.y = e.clientY;
      const [a, b] = [...ptrs.values()];
      const d = Math.hypot(a.x - b.x, a.y - b.y);
      const k = clamp(pinch0.k * d / pinch0.d, 0.5, 6);
      zoomAt(pinch0.cx, pinch0.cy, k, pinch0);
    }
  });
  const up = e => {
    if (!ptrs.has(e.pointerId)) return;
    ptrs.delete(e.pointerId);
    if (ptrs.size < 2) pinch0 = null;
    if (!moved && ptrs.size === 0 && tapTarget) {
      const uEl = tapTarget.closest('[data-u]');
      const rEl = tapTarget.closest('[data-r]');
      const pEl = tapTarget.closest('[data-p]');
      handleTap({ unit: uEl ? uEl.dataset.u : null, rmark: rEl ? rEl.dataset.r : null,
                  prov: pEl ? pEl.dataset.p : null });
    }
    tapTarget = null;
  };
  svg.addEventListener('pointerup', up);
  svg.addEventListener('pointercancel', up);
  svg.addEventListener('wheel', e => {
    e.preventDefault();
    const k = clamp(ui.tf.k * (e.deltaY < 0 ? 1.15 : 1 / 1.15), 0.5, 6);
    zoomAt(e.clientX, e.clientY, k, null);
  }, { passive: false });

  function viewScale() {
    const r = svg.getBoundingClientRect();
    return 1000 / r.width / 1; // client px → viewBox 換算（translateはviewBox座標）
  }
  function zoomAt(cx, cy, k, base) {
    const r = svg.getBoundingClientRect();
    const scale = 1000 / r.width;
    const vx = (cx - r.left) * scale, vy = (cy - r.top) * scale;
    const t = ui.tf;
    const bx = base ? base.tx : t.x, by = base ? base.ty : t.y;
    const bk = base ? base.k : t.k;
    // 拡大中心を固定: v = b + k*w ⇒ w=(v-b)/bk, 新 b' = v - k*w
    t.x = vx - (vx - bx) * (k / bk);
    t.y = vy - (vy - by) * (k / bk);
    t.k = k;
    applyTransform();
  }
  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

  // ボタン類（イベント委譲）
  document.body.addEventListener('click', e => {
    const t = e.target.closest('button');
    if (!t) return;
    if (t.dataset.mi !== undefined) {
      const el = $('modal');
      const i = +t.dataset.mi;
      if (i < 0) { closeModal(); return; }
      const b = el._buttons && el._buttons[i];
      if (b && b.cb) b.cb();
      return;
    }
    if (t.dataset.pal) {
      const sel = ui.sel;
      const act = t.dataset.pal;
      if (act === 'close') { ui.sel = null; }
      else if (act === 'hold') { setRaw(sel.unit, { kind: 'hold' }); return; }
      else if (act === 'clear') { delete S.raw[sel.unit]; ui.sel = null; autosave(); }
      else if (act === 'move') ui.sel = { ...sel, step: 'dest' };
      else if (act === 'support') ui.sel = { ...sel, step: 'sTarget' };
      else if (act === 'convoy') ui.sel = { ...sel, step: 'cArmy' };
      render(); return;
    }
    if (t.dataset.del) { delete S.raw[t.dataset.del]; autosave(); render(); return; }
    if (t.dataset.rsel) { ui.sel = { retreatFrom: t.dataset.rsel }; ui.panelOpen = false; render(); return; }
    const act = t.dataset.act;
    if (!act) return;
    if (act === 'undo') { undo(); }
    else if (act === 'menu') openMenu();
    else if (act === 'viewMode') { ui.modeSelect = true; render(); }
    else if (act === 'closeModeSelect') { ui.modeSelect = false; render(); }
    else if (act === 'pickView') {
      const pw = t.dataset.pw;
      S.view = pw ? { mode: 'single', power: pw } : { mode: t.dataset.view, power: null };
      ui.modeSelect = false; ui.sel = null; autosave(); render();
    }
    else if (act === 'doneInput') {
      if (S.view.mode === 'single') S.done[S.view.power] = true;
      S.view = { mode: 'none', power: null };
      ui.modeSelect = true; ui.sel = null; autosave(); render(); // 次の担当者がすぐ選べるよう選択画面を開く
    }
    else if (act === 'resolveFromSelect') { ui.modeSelect = false; confirmResolve(); }
    else if (act === 'cancelSel') { ui.sel = ui.sel && ui.sel.unit ? { unit: ui.sel.unit, step: 'action' } : null; render(); }
    else if (act === 'disband') {
      S.retreat.raw[ui.sel.retreatFrom] = { disband: true };
      ui.sel = null; autosave(); render();
    }
    else if (act === 'fitView') { ui.tf = { x: 0, y: 0, k: 1 }; applyTransform(); }
    else if (act === 'togglePanel') { ui.panelOpen = !ui.panelOpen; render(); }
    else if (act === 'resolve' || act === 'resolveRetreat' || act === 'applyBuilds') confirmResolve();
    else if (act === 'proceed') proceedFromResult();
    else if (act === 'newGame') newGame();
    else if (act === 'credits') openCredits();
    else if (act === 'importTitle') $('filein').click();
  });
  $('filein').addEventListener('change', e => {
    if (e.target.files && e.target.files[0]) doImport(e.target.files[0]);
    e.target.value = '';
  });
}

// ---------- 起動 ----------
window.addEventListener('DOMContentLoaded', () => {
  wire();
  showTitle();
});
// デバッグ・動作試験用の最小フック
window.__dip = { tap: handleTap, get S() { return S; }, get sel() { return ui.sel; },
  setCam: (x, y, k) => { ui.tf = { x, y, k }; applyTransform(); },
  sheetHTML: () => $('sheet')._innerHTML || $('sheet').innerHTML };
})();

</script>
</body>
</html>
